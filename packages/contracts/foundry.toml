[profile.default]
src = "src"
out = "out"
libs = ["lib", "../../node_modules"]
solc = "0.8.30"
# Pin to shanghai: Somnia's EVM rejects cancun-era opcodes (MCOPY, transient
# storage), which solc 0.8.30 emits by default. Deploying cancun bytecode halts
# the CREATE consuming all gas. Shanghai (PUSH0, no MCOPY) deploys cleanly.
evm_version = "shanghai"
optimizer = true
optimizer_runs = 1
via_ir = true
remappings = [
    "forge-std/=lib/forge-std/src/",
    "@somnia-chain/reactivity-contracts/=../../node_modules/@somnia-chain/reactivity-contracts/"
]

[rpc_endpoints]
somnia_testnet = "${SOMNIA_TESTNET_RPC_URL}"
somnia_mainnet = "${SOMNIA_MAINNET_RPC_URL}"

[etherscan]
somnia_testnet = { key = "${SOMNIA_EXPLORER_API_KEY}", url = "https://shannon-explorer.somnia.network/api" }
