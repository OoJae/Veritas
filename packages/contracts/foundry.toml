[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.24"
optimizer = true
optimizer_runs = 200

[profile.default.rpc_endpoints]
somnia_testnet = "${SOMNIA_TESTNET_RPC_URL}"
somnia_mainnet = "${SOMNIA_MAINNET_RPC_URL}"

[etherscan]
somnia_testnet = { key = "${SOMNIA_EXPLORER_API_KEY}", url = "https://shannon-explorer.somnia.network/api" }
